<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>Papan Pengumuman Kehendak Nikah - KUA Tegalsiwalan</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-green: #2d6a4f;       
            --panel-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --primary-green: #0c3823;
            --accent-orange: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-green);
            color: var(--text-dark);
            padding: 30px 15px;
            min-height: 100vh;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
        }

        /* BANNER ATAS (KOP PAPAN PENGUMUMAN) */
        .banner-kop {
            background-color: var(--panel-bg);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .logo-kemenag {
            width: 55px;
            height: auto;
            margin-bottom: 12px;
        }

        .banner-kop h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: var(--primary-green);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .banner-kop p {
            font-size: 13px;
            color: #1e293b;
            font-weight: 500;
            margin-top: 4px;
        }

        .banner-kop .tanggal-hari {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* BOX PENCARIAN (SEARCH) */
        .search-container {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }

        .search-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-green);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .search-box input {
            width: 100%;
            padding: 10px 40px 10px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 25px;
            font-size: 13px;
            outline: none;
        }

        /* STATISTIK COUNTER BAR */
        .stat-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .stat-card {
            flex: 1;
            background-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(5px);
        }

        /* WRAPPER KARTU MANIFEST */
        .manifest-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        /* GAYA KARTU VERTIKAL (MANIFEST CARD) */
        .manifest-card {
            background-color: var(--panel-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            background-color: var(--primary-green);
            color: #ffffff;
            padding: 10px 15px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-status {
            background-color: var(--accent-orange);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
        }

        .card-body {
            padding: 15px;
            font-size: 12px;
        }

        .section-title {
            font-weight: 700;
            color: var(--primary-green);
            margin: 12px 0 6px 0;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            font-size: 11px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 3px;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        .data-row {
            margin-bottom: 5px;
            display: flex;
            flex-direction: column;
        }

        .data-label {
            color: var(--text-muted);
            font-size: 10.5px;
        }

        .data-value {
            font-weight: 600;
            color: #1e293b;
        }

        /* LOADING & ERROR */
        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            color: #ffffff;
            padding: 40px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header class="banner-kop">
            <img class="logo-kemenag" src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Logo_Kementerian_Agama_Republik_Indonesia.png" alt="Logo Kemenag">
            <h1>Papan Pengumuman Kehendak Nikah</h1>
            <p>Kantor Urusan Agama Kecamatan Tegalsiwalan</p>
            <div class="tanggal-hari" id="currentDate">Memuat tanggal...</div>
        </header>

        <div class="search-container">
            <div class="search-title"><i class="fa-solid fa-magnifying-glass"></i> Cari Pengumuman</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Ketikkan nama pengantin (suami/istri) atau alamat..." oninput="searchManifest()">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
        </div>

        <div class="stat-bar">
            <div class="stat-card">
                <i class="fa-solid fa-chart-simple"></i> Total Pengumuman: <span id="totalCount">0</span>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-eye"></i> Status: Publik Resmi
            </div>
        </div>

        <main class="manifest-grid" id="manifestContainer">
            <div class="status-msg">
                <i class="fa-solid fa-spinner fa-spin"></i> Menghubungkan ke pusat data kehendak nikah...
            </div>
        </main>

    </div>

    <script>
        // Rujukan Link Spreadsheet CSV Data Nikah Sesuai Permintaan
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg_rfNkTPFHfc_lxmcG1ZIwHfWtDUtnAvAPcVZIireqJyXOBlC8lsnAPZXpKAfJJxshcmf-rGPVdFs/pub?output=csv";
        
        let allManifests = [];

        // Setup tanggal hari ini di kop
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = "Tercatat Per Hari Ini: " + new Date().toLocaleDateString('id-ID', options);

        document.addEventListener("DOMContentLoaded", fetchManifestData);

        async function fetchManifestData() {
            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error("Gagal mengambil data.");
                const text = await response.text();
                parseAndBuildManifest(text);
            } catch (error) {
                document.getElementById("manifestContainer").innerHTML = `
                    <div class="status-msg" style="color: #fecaca;">
                        <i class="fa-solid fa-triangle-exclamation"></i> Gagal memuat Papan Pengumuman Digital. Pastikan pengaturan publish Spreadsheet Anda sudah benar.
                    </div>`;
            }
        }

        function parseAndBuildManifest(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length <= 1) return;

            allManifests = [];
            
            // Membaca baris dimulai dari indeks ke-1 (baris ke-2 setelah header)
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() === "") continue;
                const columns = parseCSVLine(lines[i]);
                
                // Memastikan kolom terisi sesuai dengan struktur 9 kolom yang diminta
                if (columns.length >= 9) { 
                    allManifests.push({
                        namaSuami: columns[0] || '-',
                        namaIstri: columns[1] || '-',
                        alamatSuami: columns[2] || '-',
                        alamatIstri: columns[3] || '-',
                        hariAkad: columns[4] || '-',
                        tglAkad: columns[5] || '-',
                        jamAkad: columns[6] || '-',
                        nikahDi: columns[7] || '-',
                        penghulu: columns[8] || '-'
                    });
                }
            }
            renderCards(allManifests);
        }

        function parseCSVLine(line) {
            let arr = []; let quote = false; let cell = "";
            for (let i = 0; i < line.length; i++) {
                let char = line[i];
                if (char === '"') { quote = !quote; }
                else if (char === ',' && !quote) { arr.push(cell.trim()); cell = ""; }
                else { cell += char; }
            }
            arr.push(cell.trim());
            return arr;
        }

        function renderCards(data) {
            const container = document.getElementById("manifestContainer");
            document.getElementById("totalCount").innerText = data.length;
            container.innerHTML = "";

            if (data.length === 0) {
                container.innerHTML = `<div class="status-msg"><i class="fa-solid fa-magnifying-glass-minus"></i> Tidak ada jadwal atau nama pengantin yang cocok.</div>`;
                return;
            }

            data.forEach((item, index) => {
                container.innerHTML += `
                    <div class="manifest-card">
                        <div class="card-header">
                            <span><i class="fa-solid fa-heart"></i> Pengumuman #${index + 1}</span>
                            <span class="badge-status">Siap Akad</span>
                        </div>
                        
                        <div class="card-body">
                            <div class="section-title">🧍 Calon Suami</div>
                            <div class="data-row"><div class="data-label">Nama</div><div class="data-value">${item.namaSuami}</div></div>
                            <div class="data-row"><div class="data-label">Alamat</div><div class="data-value">${item.alamatSuami}</div></div>

                            <div class="section-title">🧍‍♀️ Calon Istri</div>
                            <div class="data-row"><div class="data-label">Nama</div><div class="data-value">${item.namaIstri}</div></div>
                            <div class="data-row"><div class="data-label">Alamat</div><div class="data-value">${item.alamatIstri}</div></div>

                            <div class="section-title">📅 Pelaksanaan Akad</div>
                            <div class="data-row"><div class="data-label">Hari & Tanggal</div><div class="data-value">${item.hariAkad}, ${item.tglAkad}</div></div>
                            <div class="data-row"><div class="data-label">Jam</div><div class="data-value">${item.jamAkad} WIB</div></div>
                            <div class="data-row"><div class="data-label">Nikah Di (Lokasi)</div><div class="data-value">${item.nikahDi}</div></div>
                            <div class="data-row"><div class="data-label">Penghulu</div><div class="data-value">${item.penghulu}</div></div>
                        </div>
                    </div>
                `;
            });
        }

        function searchManifest() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const filtered = allManifests.filter(item => {
                return item.namaSuami.toLowerCase().includes(query) || 
                       item.namaIstri.toLowerCase().includes(query) || 
                       item.alamatSuami.toLowerCase().includes(query) ||
                       item.alamatIstri.toLowerCase().includes(query);
            });
            renderCards(filtered);
        }
    </script>
</body>
</html>
